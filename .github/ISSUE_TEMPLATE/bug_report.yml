name: Bug 报告
description: 报告转换错误、乱码、格式丢失等问题
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量提供完整信息，以便快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要描述遇到的问题
      placeholder: 转换某个 CHM 文件后，部分表格格式错乱...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 列出复现该问题的具体步骤
      value: |
        1. 运行命令：`uv run python scripts/convert.py --input "..." --output "..." --category "..."`
        2. 查看输出文件：...
        3. 发现问题：...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确结果是什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么（可附截图或错误日志）
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题模块
      description: 问题大致出在哪个环节
      options:
        - CHM 提取（7-Zip 相关）
        - HTML 清理/转换
        - 目录解析（TOC）
        - 后处理（链接/表格修复）
        - 图片/资源处理
        - 不确定
    validations:
      required: true

  - type: input
    id: chm-source
    attributes:
      label: CHM 文件来源
      description: CHM 文件的来源或名称（如有公开链接可提供）
      placeholder: 例：某软件离线文档 v3.2

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 系统和工具版本信息
      value: |
        - 操作系统：
        - Python 版本：
        - 7-Zip 版本：
      render: markdown
    validations:
      required: true
