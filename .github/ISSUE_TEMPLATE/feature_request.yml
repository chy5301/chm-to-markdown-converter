name: 功能请求
description: 提议新功能或改进现有功能
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的需求和期望。

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 这个功能要解决什么问题？或者你在使用中遇到了什么不便？
      placeholder: 目前转换时无法指定只转换 CHM 中的部分章节...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的解决方式是什么
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他替代方案

  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      options:
        - CHM 提取
        - HTML 清理/转换
        - 目录解析（TOC）
        - 后处理（链接/表格修复）
        - 图片/资源处理
        - 新模块/其他
    validations:
      required: true
